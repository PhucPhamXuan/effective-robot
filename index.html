<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Bingo Realtime Multiplayer (Max 4)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    @keyframes pop-in { 0% { transform: scale(0); opacity: 0; } 80% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
    .animate-pop-in { animation: pop-in 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    @keyframes bounce-in { 0% { transform: translateX(20px) scale(0.8); opacity: 0; } 100% { transform: translateX(0) scale(1); opacity: 1; } }
    .animate-bounce-in { animation: bounce-in 0.3s ease-out forwards; }
    @keyframes bounce-scale { 0% { transform: scale(0.5); opacity: 0; } 50% { transform: scale(1.2); opacity: 1; } 70% { transform: scale(0.9); } 100% { transform: scale(1); opacity: 1; } }
    .animate-bounce-scale { animation: bounce-scale 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    .animate-pulse-fast { animation: pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
  </style>
</head>
<body class="bg-gradient-to-br from-teal-400 to-teal-700 min-h-screen font-sans text-slate-800 overflow-x-hidden relative select-none">
  
  <div class="fixed inset-0 opacity-10 pointer-events-none z-0" style="background-image: radial-gradient(circle at 20px 20px, white 2px, transparent 0); background-size: 80px 80px;"></div>

  <!-- MÀN HÌNH LOBBY -->
  <div id="lobby-screen" class="relative z-10 flex flex-col items-center justify-center min-h-screen p-4">
    <div class="bg-white p-6 lg:p-8 rounded-2xl shadow-2xl max-w-sm w-full border-4 border-[#b06030] text-center">
      <h1 class="text-3xl lg:text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-orange-400 to-red-500 mb-6 drop-shadow-sm">BINGO ONLINE</h1>
      
      <input id="player-name" type="text" placeholder="Nhập tên của bạn..." class="w-full text-center text-lg font-bold py-3 px-4 border-2 border-gray-300 rounded-xl mb-6 focus:border-teal-500 focus:outline-none">

      <button onclick="createRoom()" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-4 rounded-xl mb-4 shadow-[0_4px_0_rgb(21,128,61)] active:shadow-none active:translate-y-1 transition-all">
        🎲 TẠO PHÒNG (Host)
      </button>
      
      <div class="relative flex py-2 items-center">
        <div class="flex-grow border-t border-gray-300"></div>
        <span class="flex-shrink-0 mx-4 text-gray-400 font-bold text-sm">HOẶC</span>
        <div class="flex-grow border-t border-gray-300"></div>
      </div>

      <input id="room-id-input" type="text" placeholder="Mã phòng (VD: AB12)" class="w-full text-center text-xl font-bold py-3 px-4 border-2 border-gray-300 rounded-xl mb-4 uppercase focus:border-orange-500 focus:outline-none">
      
      <button onclick="joinRoom()" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 px-4 rounded-xl shadow-[0_4px_0_rgb(194,65,12)] active:shadow-none active:translate-y-1 transition-all">
        🚀 VÀO PHÒNG
      </button>
    </div>
  </div>

  <!-- MÀN HÌNH GAME -->
  <div id="game-screen" class="hidden relative z-10 flex flex-col min-h-screen pb-24 lg:pb-4">
    
    <div id="bingo-popup" class="hidden fixed inset-0 z-[100] flex flex-col items-center justify-center pointer-events-none bg-black/60 backdrop-blur-sm">
      <div class="text-transparent bg-clip-text bg-gradient-to-b from-yellow-300 via-yellow-400 to-orange-500 font-black text-7xl md:text-9xl tracking-widest drop-shadow-[0_10px_10px_rgba(0,0,0,0.8)] animate-bounce-scale" style="-webkit-text-stroke: 3px #8b4513;">BINGO!</div>
    </div>

    <!-- Top Bar -->
    <div class="h-16 lg:h-24 w-full flex items-center px-2 lg:px-4 bg-teal-800/20 shadow-sm shrink-0">
      <div class="flex flex-col text-white font-bold text-[10px] lg:text-sm mr-2 lg:mr-4 bg-teal-900/50 p-2 rounded-lg text-center shrink-0 border-2 border-teal-800">
        <span>PHÒNG</span>
        <span id="display-room-id" class="text-yellow-400 text-base lg:text-xl">----</span>
      </div>
      <div id="drawn-balls-container" class="flex-1 flex items-center gap-1 lg:gap-2 overflow-x-auto hide-scrollbar px-2 py-2 scroll-smooth"></div>
    </div>

    <!-- Layout chính -->
    <div class="flex-1 flex flex-col lg:flex-row items-center lg:items-start justify-start lg:justify-center px-2 lg:px-4 mt-4 gap-4 lg:gap-6 w-full max-w-6xl mx-auto overflow-y-auto lg:overflow-visible">
      
      <!-- Center: Thẻ Bingo của mình -->
      <div class="w-full max-w-[340px] sm:max-w-[420px] lg:max-w-[500px] flex-shrink-0 relative">
        <div class="bg-white rounded-xl border-[6px] lg:border-[12px] border-[#b06030] shadow-xl overflow-hidden aspect-square flex flex-col">
          <div class="flex h-10 sm:h-12 lg:h-16 w-full" id="card-header"></div>
          <div id="bingo-grid" class="flex-1 grid grid-cols-5 grid-rows-5 bg-[#ffe4c4] gap-[1px] lg:gap-[2px] p-[1px] lg:p-[2px]"></div>
        </div>
      </div>

      <!-- Right Panel: Danh sách người chơi khác (Mini Cards) & Master Board -->
      <div class="w-full max-w-[340px] sm:max-w-[420px] lg:max-w-[300px] flex flex-col gap-4">
        
        <!-- Bảng theo dõi đối thủ -->
        <div class="bg-[#8fd3a4] p-3 rounded-xl border-4 border-teal-800 shadow-xl">
          <div class="text-teal-900 font-black text-sm mb-2 flex justify-between items-center">
            <span>ĐỐI THỦ (Tối đa 4)</span>
            <span id="player-count" class="bg-teal-900 text-white px-2 rounded-full text-xs">1/4</span>
          </div>
          <div id="opponents-container" class="grid grid-cols-2 gap-2">
            <!-- Thẻ mini của người chơi khác sẽ render ở đây -->
          </div>
        </div>

        <!-- Bảng số đã gọi (Master Board) -->
        <div class="bg-[#b06030] p-2 rounded-xl border-4 border-[#8b4513] shadow-xl self-center lg:self-start w-full max-w-[200px]" id="master-board"></div>

      </div>

    </div>

    <!-- Nút Control -->
    <div id="host-controls" class="hidden fixed bottom-4 lg:bottom-6 left-1/2 -translate-x-1/2 z-50">
      <button id="btn-draw" onclick="toggleDraw()" class="px-6 lg:px-8 py-3 lg:py-4 rounded-full font-bold text-sm lg:text-lg text-white shadow-[0_8px_15px_rgba(0,0,0,0.3)] transition-all hover:-translate-y-1 active:translate-y-1 bg-green-500 border-2 border-white">
        Bắt đầu gọi số
      </button>
    </div>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot, arrayUnion } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    /* --- FIREBASE INIT --- */
    let firebaseConfig;
    if (typeof __firebase_config !== 'undefined') {
      firebaseConfig = JSON.parse(__firebase_config);
    } else {
      firebaseConfig = { apiKey: "AIzaSyDgdL4ibA4EZziE4svdOYzuKoYh09lqOKM", authDomain: "bingo-e491b.firebaseapp.com", projectId: "bingo-e491b", storageBucket: "bingo-e491b.firebasestorage.app", messagingSenderId: "33961229962", appId: "1:33961229962:web:571cadb1206de1bcb2f773" };
    }
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'github-bingo-app';
    let user = null;

    /* --- GAME STATE --- */
    const CONFIG = [
      { l: 'B', min: 1, max: 15, c: 'bg-red-500', bc: 'from-red-400 to-red-600', t: 'text-red-600' },
      { l: 'I', min: 16, max: 30, c: 'bg-yellow-400', bc: 'from-yellow-300 to-yellow-500', t: 'text-yellow-600' },
      { l: 'N', min: 31, max: 45, c: 'bg-green-500', bc: 'from-green-400 to-green-600', t: 'text-green-600' },
      { l: 'G', min: 46, max: 60, c: 'bg-blue-500', bc: 'from-blue-400 to-blue-600', t: 'text-blue-600' },
      { l: 'O', min: 61, max: 75, c: 'bg-purple-500', bc: 'from-purple-400 to-purple-600', t: 'text-purple-600' }
    ];

    let myName = "Player";
    let myCard = [];
    let drawnNumbers = [];
    let wonLines = [];
    let playersData = {}; // Chứa data của tất cả người trong phòng
    
    let isHost = false;
    let roomId = null;
    let drawInterval = null;
    let unsubscribe = null;

    const starSVG = `<svg class="w-[55%] h-[55%] fill-current" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`;

    /* --- LOGIC GAME --- */
    const getNumConfig = (num) => CONFIG.find(c => num >= c.min && num <= c.max) || CONFIG[0];
    
    function generateCard() {
      myCard = Array.from({ length: 5 }, () => []);
      CONFIG.forEach((cfg, c) => {
        let nums = new Set();
        while (nums.size < 5) nums.add(Math.floor(Math.random() * (cfg.max - cfg.min + 1)) + cfg.min);
        Array.from(nums).forEach((num, r) => myCard[r][c] = { n: num, m: false }); // Dùng key ngắn n,m cho nhẹ db
      });
    }

    function checkWinningLines() {
      const lines = [];
      for (let r = 0; r < 5; r++) if (myCard[r].every(cell => cell.m)) lines.push(`r${r}`);
      for (let c = 0; c < 5; c++) if (myCard.every(row => row[c].m)) lines.push(`c${c}`);
      if (myCard.every((row, i) => row[i].m)) lines.push('dm');
      if (myCard.every((row, i) => row[4 - i].m)) lines.push('da');
      return lines;
    }

    window.handleCellClick = async (r, c) => {
      const cell = myCard[r][c];
      if (drawnNumbers.includes(cell.n)) {
        cell.m = !cell.m;
        
        const newWonLines = checkWinningLines();
        if (newWonLines.some(line => !wonLines.includes(line))) {
          document.getElementById('bingo-popup').classList.remove('hidden');
          setTimeout(() => document.getElementById('bingo-popup').classList.add('hidden'), 2000);
        }
        wonLines = newWonLines;
        
        renderMainCard();
        renderStats();

        // Đẩy thẻ vừa cập nhật lên Firebase cho người khác xem
        if(roomId && user) {
          const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'bingo_rooms', roomId);
          await updateDoc(roomRef, {
            [`players.${user.uid}.card`]: myCard,
            [`players.${user.uid}.bingos`]: wonLines.length
          });
        }
      }
    };

    /* --- RENDER UI --- */
    function renderMainCard() {
      document.getElementById('card-header').innerHTML = CONFIG.map(c => 
        `<div class="flex-1 ${c.c} flex items-center justify-center border-r border-b border-black/20"><span class="text-white text-lg sm:text-xl lg:text-3xl font-black drop-shadow-md">${c.l}</span></div>`
      ).join('');

      let gridHtml = '';
      for (let r = 0; r < 5; r++) {
        for (let c = 0; c < 5; c++) {
          const cell = myCard[r][c];
          const isDrawn = drawnNumbers.includes(cell.n);
          const isWinCell = wonLines.includes(`r${r}`) || wonLines.includes(`c${c}`) || (r === c && wonLines.includes('dm')) || (r + c === 4 && wonLines.includes('da'));
          
          let bgClass = isWinCell ? 'bg-yellow-100' : (isDrawn && !cell.m ? 'bg-pink-50' : 'bg-white');
          let textClass = isDrawn && !cell.m ? 'text-gray-400' : 'text-slate-800';
          
          gridHtml += `
            <div onclick="handleCellClick(${r}, ${c})" class="relative w-full h-full flex items-center justify-center cursor-pointer active:bg-gray-200 transition-colors ${bgClass}">
              ${isWinCell ? '<div class="absolute inset-0 border-2 lg:border-4 border-yellow-400 animate-pulse-fast z-0"></div>' : ''}
              <span class="text-xl sm:text-2xl lg:text-3xl font-bold z-10 ${textClass}">${cell.n}</span>
              ${cell.m ? `<div class="absolute inset-0 m-auto w-[80%] h-[80%] rounded-full bg-gradient-to-br from-red-500 to-red-600 shadow-sm flex items-center justify-center border-[2px] border-red-700 animate-pop-in z-20"><div class="text-white w-full h-full flex justify-center items-center ${isWinCell ? 'text-yellow-300' : 'text-white'}">${starSVG}</div></div>` : ''}
            </div>`;
        }
      }
      document.getElementById('bingo-grid').innerHTML = gridHtml;
    }

    function renderBalls() {
      const container = document.getElementById('drawn-balls-container');
      container.innerHTML = drawnNumbers.map(num => {
        const c = getNumConfig(num);
        return `<div class="flex flex-col items-center animate-bounce-in shrink-0">
                  <div class="w-10 h-10 lg:w-14 lg:h-14 rounded-full bg-gradient-to-br ${c.bc} shadow-md flex flex-col items-center justify-center border-b-[2px] border-black/20">
                    <span class="text-white text-[8px] lg:text-xs font-bold leading-none mb-[1px]">${c.l}</span>
                    <div class="bg-white rounded-full w-6 h-6 lg:w-8 lg:h-8 flex items-center justify-center shadow-inner">
                      <span class="text-xs lg:text-base font-black ${c.t}">${num}</span>
                    </div>
                  </div>
                </div>`;
      }).join('');
      container.scrollLeft = container.scrollWidth;

      // Render Master Board
      let masterHtml = '<div class="flex bg-white rounded-t-sm overflow-hidden mb-[1px]">';
      CONFIG.forEach(c => masterHtml += `<div class="flex-1 ${c.c} flex justify-center py-0.5"><span class="text-white text-[8px] font-bold">${c.l}</span></div>`);
      masterHtml += '</div><div class="grid grid-cols-5 gap-[1px] bg-white p-[1px] rounded-b-sm">';
      for (let r = 0; r < 15; r++) {
        CONFIG.forEach(c => {
          const num = c.min + r;
          masterHtml += `<div class="h-3 flex items-center justify-center text-[7px] font-bold ${drawnNumbers.includes(num) ? 'bg-red-500 text-white' : 'bg-gray-100 text-gray-700'}">${num}</div>`;
        });
      }
      masterHtml += '</div>';
      document.getElementById('master-board').innerHTML = masterHtml;
    }

    function renderStats() {
      const pCount = Object.keys(playersData).length;
      document.getElementById('player-count').innerText = `${pCount}/4`;

      // Render Thẻ Mini của những người khác (Trừ bản thân)
      let opponentsHtml = '';
      Object.entries(playersData).forEach(([uid, data]) => {
        if (uid === user.uid) return; // Không vẽ lại thẻ của mình ở đây
        
        let miniGrid = '';
        if(data.card) {
          for(let r=0; r<5; r++){
            for(let c=0; c<5; c++){
              const cell = data.card[r][c];
              const isMarked = cell.m;
              miniGrid += `<div class="w-full aspect-square ${isMarked ? 'bg-red-500' : 'bg-white'} border border-gray-200"></div>`;
            }
          }
        }

        opponentsHtml += `
          <div class="bg-teal-900 rounded-lg p-1.5 border-2 border-teal-700 flex flex-col items-center">
            <div class="text-[10px] font-bold text-white truncate w-full text-center mb-1">${data.name}</div>
            <div class="grid grid-cols-5 gap-[1px] w-[50px] bg-gray-300 border border-gray-400 p-[1px] rounded-[2px]">
              ${miniGrid}
            </div>
            <div class="text-[9px] font-bold text-yellow-400 mt-1">${data.bingos || 0} Bingo</div>
          </div>
        `;
      });

      if(opponentsHtml === '') opponentsHtml = '<div class="col-span-2 text-center text-xs font-bold text-teal-800 italic py-2">Chưa có ai vào phòng...</div>';
      document.getElementById('opponents-container').innerHTML = opponentsHtml;
    }

    /* --- MULTIPLAYER LOGIC --- */
    const initAuth = async () => {
      try {
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
          await signInWithCustomToken(auth, __initial_auth_token);
        } else {
          await signInAnonymously(auth);
        }
      } catch (e) { console.error("Auth error:", e); }
    };
    onAuthStateChanged(auth, (u) => { user = u; });

    function showGame() {
      document.getElementById('lobby-screen').classList.add('hidden');
      document.getElementById('game-screen').classList.remove('hidden');
      document.getElementById('display-room-id').innerText = roomId;
      if (isHost) document.getElementById('host-controls').classList.remove('hidden');
      renderMainCard();
    }

    window.createRoom = async () => {
      myName = document.getElementById('player-name').value.trim() || "Host";
      if (!user) await initAuth();
      roomId = Math.random().toString(36).substring(2, 6).toUpperCase();
      isHost = true;
      generateCard();

      try {
        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'bingo_rooms', roomId), {
          drawnNumbers: [],
          hostId: user.uid,
          status: 'playing',
          players: {
            [user.uid]: { name: myName, card: myCard, bingos: 0 }
          }
        });
        listenToRoom();
        showGame();
      } catch (e) { alert("Lỗi tạo phòng: " + e.message); }
    };

    window.joinRoom = async () => {
      myName = document.getElementById('player-name').value.trim() || "Player";
      if (!user) await initAuth();
      const inputId = document.getElementById('room-id-input').value.toUpperCase().trim();
      if (!inputId) return alert("Vui lòng nhập mã phòng!");
      
      const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'bingo_rooms', inputId);
      const roomSnap = await getDoc(roomRef);
      
      if (!roomSnap.exists()) return alert("Phòng không tồn tại!");
      const roomData = roomSnap.data();
      
      // Kiểm tra giới hạn 4 người
      if (Object.keys(roomData.players || {}).length >= 4 && !roomData.players[user.uid]) {
        return alert("Phòng đã đầy (Tối đa 4 người)!");
      }

      roomId = inputId;
      isHost = false;
      generateCard();

      // Thêm mình vào danh sách players
      await updateDoc(roomRef, {
        [`players.${user.uid}`]: { name: myName, card: myCard, bingos: 0 }
      });

      listenToRoom();
      showGame();
    };

    function listenToRoom() {
      if (unsubscribe) unsubscribe();
      const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'bingo_rooms', roomId);
      
      unsubscribe = onSnapshot(roomRef, (snapshot) => {
        if (snapshot.exists()) {
          const data = snapshot.data();
          
          // Render bóng nếu có số mới
          if(data.drawnNumbers.length !== drawnNumbers.length) {
            drawnNumbers = data.drawnNumbers || [];
            renderBalls();
            renderMainCard(); // Vẽ lại màu xám mờ cho số vừa ra
          }

          // Cập nhật thẻ của đối thủ
          playersData = data.players || {};
          renderStats();
        }
      }, (error) => console.error("Listen error:", error));
    }

    window.toggleDraw = () => {
      const btn = document.getElementById('btn-draw');
      if (drawInterval) {
        clearInterval(drawInterval);
        drawInterval = null;
        btn.innerText = "Tiếp tục gọi số";
        btn.classList.replace('bg-orange-500', 'bg-green-500');
      } else {
        btn.innerText = "Tạm dừng";
        btn.classList.replace('bg-green-500', 'bg-orange-500');
        drawInterval = setInterval(drawNextNumber, 1500); 
      }
    };

    async function drawNextNumber() {
      if (drawnNumbers.length >= 75) {
        clearInterval(drawInterval);
        return;
      }
      let newNum;
      do { newNum = Math.floor(Math.random() * 75) + 1; } while (drawnNumbers.includes(newNum));
      
      const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'bingo_rooms', roomId);
      await updateDoc(roomRef, { drawnNumbers: arrayUnion(newNum) });
    }

    initAuth();
  </script>
</body>
</html>
